map ctrl+shift+, ungrabbed
map ctrl+shift+b ungrabbed
map ctrl+shift+c ungrabbed
map ctrl+shift+e ungrabbed
map ctrl+shift+f ungrabbed
map ctrl+shift+i ungrabbed
map ctrl+shift+l ungrabbed
map ctrl+shift+m ungrabbed
map ctrl+shift+n ungrabbed
map ctrl+shift+o ungrabbed
map ctrl+shift+p ungrabbed
map ctrl+shift+p ungrabbed
map ctrl+shift+q ungrabbed
map ctrl+shift+r ungrabbed
map ctrl+shift+s ungrabbed
map ctrl+shift+t ungrabbed
map ctrl+shift+tab ungrabbed
map ctrl+shift+w ungrabbed
map ctrl+tab ungrabbed

map alt+' new_tab_with_cwd code-assistant
map alt+t new_tab_with_cwd
map alt+w close_tab
map alt+é close_tab
map alt+tab next_tab
map alt+shift+tab previous_tab

map ctrl+return launch --location=vsplit

map alt+return layout_action rotate
map alt+up move_window up
map alt+left move_window left
map alt+right move_window right
map alt+down move_window down

map shift+left resize_window narrower
map shift+right resize_window wider
map shift+up resize_window taller
map shift+down resize_window shorter 3

map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+equal change_font_size all 0
map ctrl+ç change_font_size all 0
map ctrl+' launch --cwd=current --type os-window --os-window-class kitty-light
map alt+l clear_terminal to_cursor active
